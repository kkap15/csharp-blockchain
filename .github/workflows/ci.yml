name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore MiniChain.sln

      - name: Build
        run: dotnet build MiniChain.sln --no-restore -c Release

      - name: Test
        run: dotnet test MiniChain.sln --no-build -c Release --logger "console;verbosity=normal"